client_id = "adf7e6fa0bd93a8b487b435caf004fb9"
name = "wholesale-pricing-app"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,write_discounts,read_discounts"
[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "/api/wholesale"
subpath = "wholesale"
prefix = "apps"