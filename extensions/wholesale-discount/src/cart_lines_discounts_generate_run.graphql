query CartInput {
  cart {
    lines {
      id
      quantity

      cost {
        amountPerQuantity {
          amount
        }
      }

      merchandise {
        __typename

        ... on ProductVariant {
          id

          product {
            id
          }
        }
      }
    }
  }

  discount {
    metafield(
      namespace: "app"
      key: "function-configuration"
    ) {
      value
    }
  }
}